<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <nav class="glass-nav">
            <h1 class="logo">Our Website ✨</h1>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#messages">Messages</a></li>
            </ul>
        </nav>

        <section id="home" class="hero">
            <div class="hero-content">
                <h2 class="title">Hello <span class="highlight">Beautiful</span></h2>
                <p class="subtitle">A special little corner of the internet, just for us.</p>
                <button class="cta-btn" id="surpriseBtn">Click for a surprise 🎁</button>
            </div>
            
            <div class="glass-card hidden" id="messageCard">
                <div class="card-content">
                    <h3>You are amazing! 💖</h3>
                    <p>I built this website from scratch just to show you how much I care.</p>
                    <button class="close-btn" id="closeBtn">Close</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
